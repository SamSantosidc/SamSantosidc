name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: SamSantosidc

          filename: github-metrics.svg
          output_action: commit
          committer_branch: main
          committer_message: "chore: update GitHub metrics"

          template: classic
          config_timezone: America/Recife
          config_display: regular
          config_octicon: true
          config_padding: 0, 8 + 11%
          config_twemoji: true

          base: activity
          base_indepth: true

          plugin_isocalendar: true
          plugin_isocalendar_duration: half-year

          extras_css: |
            :root {
              --color-calendar-graph-day-bg: #161b22;
              --color-calendar-graph-day-L1-bg: #0e4429;
              --color-calendar-graph-day-L2-bg: #006d32;
              --color-calendar-graph-day-L3-bg: #26a641;
              --color-calendar-graph-day-L4-bg: #39d353;
            }

            .field {
              color: #c9d1d9;
            }

            .field svg {
              fill: #58a6ff;
            }

            h1, h2, h3 {
              color: #f0f6fc;
            }

            section {
              color: #c9d1d9;
            }

            svg {
              background: #0d1117;
            }
